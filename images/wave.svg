<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="90" fill="white" filter="drop-shadow(0 4px 12px rgba(0,0,0,.22))"/>
  <clipPath id="circ"><circle cx="100" cy="100" r="82"/></clipPath>
  <circle cx="100" cy="100" r="82" fill="#2d1b69"/>
  <g clip-path="url(#circ)">
    <!-- Sky gradient -->
    <rect x="18" y="18" width="164" height="82" fill="#1e0940"/>
    <rect x="18" y="100" width="164" height="82" fill="#0f172a"/>
    <!-- Grid floor lines horizontal -->
    <line x1="18" y1="110" x2="182" y2="110" stroke="#ff006e" stroke-width="1" opacity=".7"/>
    <line x1="18" y1="120" x2="182" y2="120" stroke="#ff006e" stroke-width="1.2" opacity=".7"/>
    <line x1="18" y1="132" x2="182" y2="132" stroke="#ff006e" stroke-width="1.5" opacity=".7"/>
    <line x1="18" y1="146" x2="182" y2="146" stroke="#ff006e" stroke-width="2" opacity=".8"/>
    <line x1="18" y1="163" x2="182" y2="163" stroke="#ff006e" stroke-width="2.5" opacity=".8"/>
    <line x1="18" y1="182" x2="182" y2="182" stroke="#ff006e" stroke-width="3" opacity=".8"/>
    <!-- Grid vertical lines converging -->
    <line x1="100" y1="100" x2="18" y2="182" stroke="#8338ec" stroke-width="1.5" opacity=".7"/>
    <line x1="100" y1="100" x2="60" y2="182" stroke="#8338ec" stroke-width="1.5" opacity=".7"/>
    <line x1="100" y1="100" x2="100" y2="182" stroke="#8338ec" stroke-width="1.5" opacity=".7"/>
    <line x1="100" y1="100" x2="140" y2="182" stroke="#8338ec" stroke-width="1.5" opacity=".7"/>
    <line x1="100" y1="100" x2="182" y2="182" stroke="#8338ec" stroke-width="1.5" opacity=".7"/>
    <!-- Sun/moon -->
    <circle cx="100" cy="72" r="22" fill="#ff006e" opacity=".85"/>
    <rect x="18" y="72" width="164" height="22" fill="#2d1b69"/>
    <!-- Horizon lines through sun -->
    <line x1="18" y1="72" x2="182" y2="72" stroke="#ff006e" stroke-width="3" opacity=".9"/>
    <line x1="18" y1="78" x2="182" y2="78" stroke="#ff006e" stroke-width="2" opacity=".7"/>
    <line x1="18" y1="84" x2="182" y2="84" stroke="#ff006e" stroke-width="1.5" opacity=".6"/>
    <!-- Stars -->
    <circle cx="50" cy="45" r="2" fill="white"/>
    <circle cx="150" cy="40" r="2" fill="white"/>
    <circle cx="130" cy="55" r="1.5" fill="white"/>
    <circle cx="70" cy="50" r="1.5" fill="white"/>
  </g>
</svg>
