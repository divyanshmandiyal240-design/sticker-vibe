<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="90" fill="white" filter="drop-shadow(0 4px 12px rgba(0,0,0,.22))"/>
  <circle cx="100" cy="100" r="82" fill="#050510"/>
  <!-- Background energy rings -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#7f1d1d" stroke-width="1" opacity=".4"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#991b1b" stroke-width="1" opacity=".3"/>
  <!-- Glow behind eye -->
  <ellipse cx="100" cy="100" rx="45" ry="35" fill="#dc2626" opacity=".12"/>
  <!-- Eye white / sclera (dark for demon) -->
  <ellipse cx="100" cy="100" rx="48" ry="30" fill="#1a0000"/>
  <ellipse cx="100" cy="100" rx="48" ry="30" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <!-- Iris -->
  <circle cx="100" cy="100" r="22" fill="#b91c1c"/>
  <circle cx="100" cy="100" r="22" fill="none" stroke="#7f1d1d" stroke-width="2"/>
  <!-- Iris detail rings -->
  <circle cx="100" cy="100" r="18" fill="none" stroke="#dc2626" stroke-width="1" opacity=".6"/>
  <circle cx="100" cy="100" r="14" fill="none" stroke="#ef4444" stroke-width="1" opacity=".4"/>
  <!-- Pupil (slit) -->
  <ellipse cx="100" cy="100" rx="5" ry="20" fill="#000"/>
  <!-- Eye shine -->
  <ellipse cx="90" cy="88" rx="6" ry="4" fill="white" opacity=".35" transform="rotate(-20,90,88)"/>
  <circle cx="108" cy="108" r="3" fill="white" opacity=".15"/>
  <!-- Upper eyelid / lash line -->
  <path d="M52 100C52 78 72 68 100 68C128 68 148 78 148 100" fill="#050510"/>
  <path d="M52 100C52 78 72 68 100 68C128 68 148 78 148 100" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <!-- Lashes top -->
  <line x1="68" y1="78" x2="64" y2="68" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="70" x2="78" y2="60" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="68" x2="100" y2="58" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="70" x2="122" y2="60" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="132" y1="78" x2="136" y2="68" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <!-- Kanji-style marks around (decorative) -->
  <line x1="38" y1="88" x2="46" y2="88" stroke="#dc2626" stroke-width="1.5" opacity=".5"/>
  <line x1="42" y1="84" x2="42" y2="92" stroke="#dc2626" stroke-width="1.5" opacity=".5"/>
  <line x1="154" y1="88" x2="162" y2="88" stroke="#dc2626" stroke-width="1.5" opacity=".5"/>
  <line x1="158" y1="84" x2="158" y2="92" stroke="#dc2626" stroke-width="1.5" opacity=".5"/>
  <!-- Drip below eye -->
  <path d="M90 130C90 130 92 140 90 148" stroke="#dc2626" stroke-width="2" fill="none" stroke-linecap="round" opacity=".6"/>
  <circle cx="90" cy="149" r="3" fill="#dc2626" opacity=".6"/>
</svg>
